<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gas Station Ready - รายงานสถานะปั๊มน้ำมัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        :root {
            --primary: #00E676; 
            --dark: #121212;
            --darker: #000000;
            --text-light: #F5F5F5;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            height: 100%; margin: 0; padding: 0; 
            font-family: 'Prompt', sans-serif; 
            display: flex; flex-direction: column;
            background-color: var(--darker);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text-light);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .header .brand { font-size: 20px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; }
        .header .brand span { color: var(--primary); }
        .header .subtitle { font-size: 11px; color: #aaa; }

        .map-wrapper { position: relative; flex-grow: 1; width: 100%; }
        #map { height: 100%; width: 100%; }

        .price-board {
            position: absolute;
            top: 20px; left: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            z-index: 5;
            border-left: 5px solid var(--primary);
        }
        .price-board h3 { margin: 0 0 10px 0; font-size: 15px; color: var(--dark); font-weight: 600; }
        #price-list { display: flex; gap: 8px; flex-direction: row; flex-wrap: wrap; max-width: 280px; }
        
        .price-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 8px 10px; border-radius: 10px; min-width: 65px; flex-grow: 1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .fuel-name { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
        .fuel-price { font-size: 14px; font-weight: 700; }
        .update-time { font-size: 10px; color: #888; text-align: right; margin-top: 10px; }

        .info-window { padding: 5px; width: 240px; }
        .info-window h3 { margin: 0 0 10px 0; font-size: 16px; font-weight: 600; color: var(--dark);}
        .form-group { margin-bottom: 10px; font-size: 13px; background: #f9f9f9; padding: 10px; border-radius: 8px;}
        .radio-group { display: flex; gap: 10px; }
        .btn-submit { 
            background: var(--primary); color: #000; border: none; padding: 12px; 
            border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600;
        }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; color: white; margin-bottom: 8px;}

        @media (max-width: 768px) {
            .price-board { top: auto; bottom: 25px; left: 10px; right: 10px; border-left: none; border-top: 4px solid var(--primary); }
            #price-list { flex-wrap: nowrap; overflow-x: auto; max-width: 100%; padding-bottom: 5px; }
            #price-list::-webkit-scrollbar { display: none; }
            .price-card { min-width: 75px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="brand">⛽ Gas<span>Ready</span></h1>
        <div class="subtitle">เช็กปั๊ม & รายงานคิว Real-time</div>
    </div>

    <div class="map-wrapper">
        <div class="price-board">
            <h3>ราคาน้ำมันวันนี้ 📈</h3>
            <div id="price-list">
                <div style="color:#aaa; font-size: 12px;">กำลังดึงข้อมูล...</div>
            </div>
            <div class="update-time" id="price-update-time">อัปเดต: -</div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        // 2. ใช้ URL และ API KEY จากไฟล์ที่ทำงานได้จริงของคุณ
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbysSgAtS-Uuu6d1yL9IQly5BNwd3DeRVK8CEOP1XWsr_HWvSCOS3gBorkyNOEvsCIrF/exec'; 
        const LIFF_ID = '2009532259-udVOoLeg'; // อย่าลืมใส่ LIFF ID จาก LINE Developer นะครับ

        let map, infowindow, trafficLayer, lineUserId = "guest_user";
        let dbStatus = {}; 
        let AdvancedMarkerElement, PinElement;

        async function initMap() {
            // เริ่มต้นระบบ LINE LIFF (ใส่ try-catch เพื่อให้แผนที่ยังโหลดได้แม้ LIFF จะมีปัญหา)
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    lineUserId = profile.userId;
                }
            } catch (err) { console.log("LIFF Init Skip/Error", err); }

            await fetchReports();
            loadOilPrices(); 

            const markerLib = await google.maps.importLibrary("marker");
            AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
            PinElement = markerLib.PinElement;

            let centerLocation = { lat: 12.866, lng: 101.225 }; // พิกัดระยอง (หนองละลอก)

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        centerLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                        renderMap(centerLocation); 
                        addUserMarker(centerLocation);
                    },
                    () => { renderMap(centerLocation); }
                );
            } else { renderMap(centerLocation); }
        }

        async function renderMap(location) {
            map = new google.maps.Map(document.getElementById("map"), {
                center: location, zoom: 14, mapId: "GAS_STATION_READY_ID",
                disableDefaultUI: true, zoomControl: true
            });

            trafficLayer = new google.maps.TrafficLayer();
            trafficLayer.setMap(map);
            infowindow = new google.maps.InfoWindow();

            const { Place } = await google.maps.importLibrary("places");
            // ใช้ค่า radius 10,000 เมตรตามไฟล์ที่ทำงานได้ของคุณ
            const request = {
                fields: ['displayName', 'location', 'id', 'accessibilityOptions'],
                locationRestriction: { center: location, radius: 10000 },
                includedPrimaryTypes: ['gas_station'], 
                maxResultCount: 20,
            };

            try {
                const { places } = await Place.searchNearby(request);
                if (places) places.forEach(createGasStationMarker);
            } catch (error) { console.error("Search Error:", error); }
        }

        function addUserMarker(loc) {
            const pin = new PinElement({ background: "#00E676", scale: 0.8 });
            new AdvancedMarkerElement({ map, position: loc, content: pin.element, zIndex: 99 });
        }

        async function fetchReports() {
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if(result.status === 'success') {
                    result.data.forEach(item => { dbStatus[item.placeId] = item; });
                }
            } catch (error) { console.error("Fetch DB Error", error); }
        }

        function loadOilPrices() {
            const prices = [
                { n: "GSH 95", p: "36.85", b: "#FFEBEE", c: "#C62828" },
                { n: "GSH 91", p: "36.58", b: "#FFF8E1", c: "#F57F17" },
                { n: "E20", p: "34.74", b: "#E8F5E9", c: "#2E7D32" },
                { n: "ดีเซล", p: "32.94", b: "#E3F2FD", c: "#1565C0" }
            ];
            document.getElementById('price-list').innerHTML = prices.map(i => `
                <div class="price-card" style="background:${i.b}; border:1px solid ${i.c}44;">
                    <div class="fuel-name" style="color:${i.c}">${i.n}</div>
                    <div class="fuel-price" style="color:${i.c}">${i.p}</div>
                </div>`).join('');
            document.getElementById('price-update-time').innerText = `อัปเดต: ${new Date().toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'})} น.`;
        }

        function createGasStationMarker(place) {
            let pinColor = "#607D8B"; // สีเทา (รอรายงาน)
            let trafficTxt = '<span style="color:#888">⏳ รอการรายงานคิว</span>';
            let statusBadge = '<span class="status-badge" style="background:#607D8B">รอข้อมูล</span>';

            if (dbStatus[place.id]) {
                const r = dbStatus[place.id];
                if (r.fuelStatus === 'empty') {
                    pinColor = "#E53935";
                    statusBadge = '<span class="status-badge" style="background:#E53935">น้ำมันหมด</span>';
                    trafficTxt = '<span style="color:#E53935">❌ ปิดรับคิว</span>';
                } else {
                    statusBadge = '<span class="status-badge" style="background:#00E676; color:#000">มีน้ำมัน</span>';
                    if (r.queueLevel === 'น้อย') { pinColor="#00E676"; trafficTxt='<span style="color:#00E676">✅ คิวน้อย</span>'; }
                    else if (r.queueLevel === 'ปานกลาง') { pinColor="#FF9800"; trafficTxt='<span style="color:#FF9800">🚗 คิวปานกลาง</span>'; }
                    else { pinColor="#E65100"; trafficTxt='<span style="color:#E65100">🛑 คิวยาวมาก</span>'; }
                }
            }

            const pin = new PinElement({ background: pinColor, glyph: "⛽", glyphColor: "#fff" });
            const marker = new AdvancedMarkerElement({ map, position: place.location, content: pin.element, title: place.displayName });

            marker.addListener("click", () => {
                const html = `
                    <div class="info-window">
                        <h3>⛽ ${place.displayName}</h3>
                        ${statusBadge}<br>
                        <small>สภาพจราจร: ${trafficTxt}</small>
                        <hr>
                        <div class="form-group">
                            <label>สถานะน้ำมันปัจจุบัน</label>
                            <div class="radio-group">
                                <label><input type="radio" name="f" value="available" checked> มีน้ำมัน</label>
                                <label><input type="radio" name="f" value="empty"> หมด</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>ปริมาณคิวที่รอ</label>
                            <div class="radio-group">
                                <label><input type="radio" name="q" value="น้อย" checked> น้อย</label>
                                <label><input type="radio" name="q" value="ปานกลาง"> กลาง</label>
                                <label><input type="radio" name="q" value="มาก"> มาก</label>
                            </div>
                        </div>
                        <button class="btn-submit" onclick="sendReport('${place.id}','${place.displayName.replace(/'/g, "\\\\'")}')">อัปเดตสถานะเลย</button>
                    </div>`;
                infowindow.setContent(html);
                infowindow.open(map, marker);
            });
        }

        async function sendReport(id, name) {
            const fuelStatus = document.querySelector('input[name="f"]:checked').value;
            const queueLevel = document.querySelector('input[name="q"]:checked').value;
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "กำลังอัปเดต..."; btn.disabled = true;

            try {
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ placeId: id, placeName: name, fuelStatus, queueLevel, userId: lineUserId }) 
                });
                location.reload();
            } catch (e) { alert("เกิดข้อผิดพลาด"); btn.disabled = false; }
        }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIYKKj4yT7Ys0__UdYEYNaMeIKw1V0h0I&loading=async&libraries=places,geometry,marker&callback=initMap"></script>
</body>
</html>
