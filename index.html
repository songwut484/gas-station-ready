<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gas Station Ready - รายงานสถานะปั๊มน้ำมัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        :root {
            --primary: #00E676; 
            --dark: #121212;
            --darker: #000000;
            --text-light: #F5F5F5;
            --card-bg: rgba(255, 255, 255, 0.98);
        }

        body, html { 
            height: 100%; margin: 0; padding: 0; 
            font-family: 'Prompt', sans-serif; 
            display: flex; flex-direction: column;
            background-color: var(--darker);
            overflow: hidden;
        }

        /* --- 🏃 อนิเมชั่นคนวิ่ง --- */
        @keyframes running {
            0% { transform: translateX(-20px) skewX(-10deg); }
            25% { transform: translateY(-5px) skewX(0deg); }
            50% { transform: translateX(20px) skewX(10deg); }
            75% { transform: translateY(-5px) skewX(0deg); }
            100% { transform: translateX(-20px) skewX(-10deg); }
        }

        .runner {
            font-size: 50px;
            display: inline-block;
            animation: running 0.6s infinite linear;
        }

        .runner-mini {
            font-size: 18px;
            display: inline-block;
            animation: running 0.5s infinite linear;
            vertical-align: middle;
            margin-right: 8px;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--darker); color: white;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column; gap: 10px;
        }

        /* Header & Profile */
        .header {
            background: linear-gradient(90deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text-light);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .header .brand { font-size: 18px; font-weight: 700; margin: 0; }
        .header .brand span { color: var(--primary); }
        #user-profile { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        #user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }

        .map-wrapper { position: relative; flex-grow: 1; width: 100%; }
        #map { height: 100%; width: 100%; }

        /* Price Board */
        .price-board {
            position: absolute; top: 15px; left: 15px;
            background: var(--card-bg);
            padding: 15px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 5;
            border-top: 4px solid var(--primary);
            width: 280px;
        }
        .price-board h3 { margin: 0 0 12px 0; font-size: 14px; font-weight: 600; color: #333; }
        #price-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .price-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 10px 5px; border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .fuel-name { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
        .fuel-price { font-size: 16px; font-weight: 700; }

        /* ✅ สไตล์ปุ่มโดเนท */
        .donate-btn {
            margin-top: 15px;
            padding: 10px;
            background: #FFF9C4; 
            border-radius: 12px;
            text-decoration: none;
            color: #795548; 
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            border: 1px solid #FFF176;
        }
        .donate-btn:active { transform: scale(0.95); }
        .heart { color: #e91e63; display: inline-block; animation: heartBeat 1.2s infinite; }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* InfoWindow */
        .info-window { padding: 5px; width: 240px; }
        .report-count-tag { font-size: 11px; color: #666; background: #eee; padding: 2px 8px; border-radius: 10px; margin-top: 5px; display: inline-block; }
        .form-group { margin-bottom: 10px; font-size: 13px; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        .radio-group { display: flex; gap: 10px; margin-top: 5px; }
        .btn-submit { 
            background: var(--primary); color: #000; border: none; padding: 12px; 
            border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; color: white; margin-bottom: 5px; font-weight: 600;}

        @media (max-width: 768px) {
            .price-board { top: auto; bottom: 25px; left: 12px; right: 12px; width: auto; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="runner">🏃💨</div>
        <div style="font-size: 24px; font-weight:700; margin-top:10px;">⛽ GasReady</div>
        <div style="color: #aaa; font-size: 14px;">กำลังตรวจสอบสิทธิ์ LINE...</div>
    </div>

    <div class="header">
        <h1 class="brand">⛽ Gas<span>Ready</span></h1>
        <div id="user-profile"></div>
    </div>

    <div class="map-wrapper">
        <div class="price-board">
            <h3>ราคาน้ำมันวันนี้ 📈</h3>
            <div id="price-list"></div>
            
            <a href="https://promptpay.io/ใส่เลขพร้อมเพย์ของคุณ" class="donate-btn" target="_blank">
                <span class="heart">❤️</span> เลี้ยงกาแฟทีมพัฒนา ☕
            </a>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzM8zr4cQGx9KBmSp2t6j860M3sUiQZ3zpXx07bC1_fOXu6F5F_wTMhxkhUEIUPzYnd/exec'; 
        const LIFF_ID = '2009532259-udVOoLeg'; 

        let map, infowindow, lineUserId = "";
        let dbStatus = {}; 
        let AdvancedMarkerElement, PinElement;

        async function initMap() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                document.getElementById('user-profile').innerHTML = `
                    <div style="text-align:right">
                        <div style="color:#888; font-size:10px;">สวัสดี</div>
                        <div style="font-weight:600; color:var(--primary)">${profile.displayName}</div>
                    </div>
                    <img src="${profile.pictureUrl}" alt="Profile">
                `;

                document.getElementById('loading-screen').style.display = 'none';

                await fetchReports();
                loadOilPrices(); 

                const markerLib = await google.maps.importLibrary("marker");
                AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
                PinElement = markerLib.PinElement;

                let centerLocation = { lat: 12.866, lng: 101.225 }; 
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            centerLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                            renderMap(centerLocation); 
                            addUserMarker(centerLocation);
                        },
                        () => { renderMap(centerLocation); }
                    );
                } else { renderMap(centerLocation); }
            } catch (err) { alert("กรุณาเปิดผ่านแอป LINE"); }
        }

        async function renderMap(location) {
            map = new google.maps.Map(document.getElementById("map"), {
                center: location, zoom: 14, mapId: "GAS_STATION_READY_ID",
                disableDefaultUI: true, zoomControl: true
            });
            infowindow = new google.maps.InfoWindow();
            const { Place } = await google.maps.importLibrary("places");
            const request = {
                fields: ['displayName', 'location', 'id'],
                locationRestriction: { center: location, radius: 10000 },
                includedPrimaryTypes: ['gas_station'], 
                maxResultCount: 20,
            };
            try {
                const { places } = await Place.searchNearby(request);
                if (places) places.forEach(createGasStationMarker);
            } catch (error) { console.error(error); }
        }

        function addUserMarker(loc) {
            const pin = new PinElement({ background: "#00E676", scale: 0.8 });
            new AdvancedMarkerElement({ map, position: loc, content: pin.element, zIndex: 99 });
        }

        async function fetchReports() {
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if(result.status === 'success') {
                    result.data.forEach(item => { dbStatus[item.placeId] = item; });
                }
            } catch (error) {}
        }

        function loadOilPrices() {
            const prices = [
                { n: "GSH 95", p: "36.85", b: "#FFEBEE", c: "#C62828" },
                { n: "GSH 91", p: "36.58", b: "#FFF8E1", c: "#F57F17" },
                { n: "E20", p: "34.74", b: "#E8F5E9", c: "#2E7D32" },
                { n: "ดีเซล", p: "32.94", b: "#E3F2FD", c: "#1565C0" }
            ];
            document.getElementById('price-list').innerHTML = prices.map(i => `
                <div class="price-card" style="background:${i.b}; border:1px solid ${i.c}22;">
                    <div class="fuel-name" style="color:${i.c}">${i.n}</div>
                    <div class="fuel-price" style="color:${i.c}">${i.p}</div>
                </div>`).join('');
        }

        function createGasStationMarker(place) {
            let pinColor = "#607D8B"; 
            let trafficTxt = '⏳ รอการรายงานคิว';
            let statusBadge = '<span class="status-badge" style="background:#607D8B">รอข้อมูล</span>';
            let reportCountText = '';

            if (dbStatus[place.id]) {
                const r = dbStatus[place.id];
                const count = r.count || 1;
                reportCountText = `<div class="report-count-tag">👥 ${count} รายงานใน 1 ชม. ล่าสุด</div>`;

                if (r.fuelStatus === 'empty') {
                    pinColor = "#E53935";
                    statusBadge = '<span class="status-badge" style="background:#E53935">❌ น้ำมันหมด</span>';
                    trafficTxt = 'งดรับคิว';
                } else {
                    statusBadge = '<span class="status-badge" style="background:#00E676; color:#000">✅ มีน้ำมัน</span>';
                    if (r.queueLevel === 'น้อย') { pinColor="#00E676"; trafficTxt='🚗 คิวน้อย (โล่ง)'; }
                    else if (r.queueLevel === 'ปานกลาง') { pinColor="#FF9800"; trafficTxt='🚗 คิวปานกลาง'; }
                    else { pinColor="#E65100"; trafficTxt='🛑 คิวยาวมาก'; }
                }
            }

            const pin = new PinElement({ background: pinColor, glyph: "⛽", glyphColor: "#fff" });
            const marker = new AdvancedMarkerElement({ map, position: place.location, content: pin.element, title: place.displayName });

            marker.addListener("click", () => {
                const html = `
                    <div class="info-window">
                        <h3 style="margin:0 0 10px 0; font-size:15px; border-bottom:1px solid #eee; padding-bottom:5px;">⛽ ${place.displayName}</h3>
                        ${statusBadge}<br>
                        <div style="font-size:12px; margin-top:5px;"><b>สถานะคิว:</b> ${trafficTxt}</div>
                        ${reportCountText}
                        <hr style="border:0; border-top:1px dashed #ccc; margin:12px 0;">
                        <div class="form-group">
                            <label>แจ้งสถานะน้ำมัน</label>
                            <div class="radio-group">
                                <label><input type="radio" name="f" value="available" checked> มี</label>
                                <label><input type="radio" name="f" value="empty"> หมด</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>แจ้งปริมาณคิวที่รอ</label>
                            <div class="radio-group">
                                <label><input type="radio" name="q" value="น้อย" checked> น้อย</label>
                                <label><input type="radio" name="q" value="ปานกลาง"> กลาง</label>
                                <label><input type="radio" name="q" value="มาก"> มาก</label>
                            </div>
                        </div>
                        <button class="btn-submit" onclick="sendReport('${place.id}','${place.displayName.replace(/'/g, "\\\\'")}')">ยืนยันและอัปเดตข้อมูล</button>
                    </div>`;
                infowindow.setContent(html);
                infowindow.open(map, marker);
            });
        }

        async function sendReport(id, name) {
            const fuelStatus = document.querySelector('input[name="f"]:checked').value;
            const queueLevel = document.querySelector('input[name="q"]:checked').value;
            const btn = document.querySelector('.btn-submit');
            
            btn.innerHTML = '<span class="runner-mini">🏃💨</span> กำลังบันทึก...';
            btn.disabled = true;

            try {
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ placeId: id, placeName: name, fuelStatus, queueLevel, userId: lineUserId }) 
                });
                location.reload();
            } catch (e) { 
                alert("เกิดข้อผิดพลาด"); 
                btn.innerHTML = 'ยืนยันและอัปเดตข้อมูล';
                btn.disabled = false; 
            }
        }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIYKKj4yT7Ys0__UdYEYNaMeIKw1V0h0I&loading=async&libraries=places,geometry,marker&callback=initMap"></script>
</body>
</html>
