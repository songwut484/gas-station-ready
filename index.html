<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gas Station Ready - รายงานสถานะปั๊มน้ำมัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        :root {
            --primary: #00E676; 
            --dark: #121212;
            --darker: #000000;
            --text-light: #F5F5F5;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body, html { 
            height: 100%; margin: 0; padding: 0; 
            font-family: 'Prompt', sans-serif; 
            display: flex; flex-direction: column;
            background-color: var(--darker);
            overflow: hidden;
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--darker); color: white;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; flex-direction: column; gap: 20px;
        }

        .header {
            background: linear-gradient(90deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text-light);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .header .brand { font-size: 18px; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; }
        .header .brand span { color: var(--primary); }

        /* --- สไตล์ใหม่สำหรับ Profile --- */
        #user-profile { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        #user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }
        #user-profile .name { display: flex; flex-direction: column; }

        .map-wrapper { position: relative; flex-grow: 1; width: 100%; }
        #map { height: 100%; width: 100%; }

        .price-board {
            position: absolute; top: 15px; left: 15px;
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 12px; border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1); z-index: 5;
            border-left: 4px solid var(--primary);
        }
        #price-list { display: flex; gap: 6px; flex-direction: row; flex-wrap: wrap; max-width: 260px; }
        .price-card {
            display: flex; flex-direction: column; align-items: center;
            padding: 6px 8px; border-radius: 8px; min-width: 55px; flex-grow: 1;
        }
        .fuel-name { font-size: 10px; font-weight: 600; }
        .fuel-price { font-size: 12px; font-weight: 700; }

        .info-window { padding: 3px; width: 220px; }
        .form-group { margin-bottom: 8px; font-size: 12px; background: #f9f9f9; padding: 8px; border-radius: 6px; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 4px; color: #333; }
        .radio-group { display: flex; gap: 8px; }
        .btn-submit { 
            background: var(--primary); color: #000; border: none; padding: 10px; 
            border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; font-size: 13px;
        }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 11px; color: white; margin-bottom: 6px;}

        @media (max-width: 768px) {
            .header { padding: 8px 15px; }
            .header .brand { font-size: 16px; }
            #user-profile img { width: 30px; height: 30px; }
            .price-board { top: auto; bottom: 20px; left: 8px; right: 8px; border-left: none; border-top: 3px solid var(--primary); }
            #price-list { flex-wrap: nowrap; overflow-x: auto; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="font-size: 24px;">⛽ GasReady</div>
        <div>กำลังตรวจสอบสิทธิ์ผ่าน LINE...</div>
    </div>

    <div class="header">
        <h1 class="brand">⛽ Gas<span>Ready</span></h1>
        <div id="user-profile"></div>
    </div>

    <div class="map-wrapper">
        <div class="price-board">
            <h3 style="margin:0 0 8px 0; font-size:14px;">ราคาน้ำมันวันนี้ 📈</h3>
            <div id="price-list"></div>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbysSgAtS-Uuu6d1yL9IQly5BNwd3DeRVK8CEOP1XWsr_HWvSCOS3gBorkyNOEvsCIrF/exec'; 
        const LIFF_ID = '2009532259-udVOoLeg'; 

        let map, infowindow, lineUserId = "";
        let dbStatus = {}; 
        let AdvancedMarkerElement, PinElement;

        async function initMap() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }

                const profile = await liff.getProfile();
                lineUserId = profile.userId;

                // ✅ JavaScript ส่วนใหม่: แสดงผลรูปและชื่อใน Header
                const profileElement = document.getElementById('user-profile');
                profileElement.innerHTML = `
                    <div class="name">
                        <span>สวัสดี</span>
                        <span style="font-weight: 600; color:var(--primary);">${profile.displayName}</span>
                    </div>
                    <img src="${profile.pictureUrl || 'https://via.placeholder.com/150'}" alt="Profile">
                `;

                document.getElementById('loading-screen').style.display = 'none';

                await fetchReports();
                loadOilPrices(); 

                const markerLib = await google.maps.importLibrary("marker");
                AdvancedMarkerElement = markerLib.AdvancedMarkerElement;
                PinElement = markerLib.PinElement;

                let centerLocation = { lat: 12.866, lng: 101.225 }; 
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            centerLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                            renderMap(centerLocation); 
                            addUserMarker(centerLocation);
                        },
                        () => { renderMap(centerLocation); }
                    );
                } else { renderMap(centerLocation); }

            } catch (err) { alert("กรุณาเปิดผ่านแอป LINE เท่านั้น"); }
        }

        async function renderMap(location) {
            map = new google.maps.Map(document.getElementById("map"), {
                center: location, zoom: 14, mapId: "GAS_STATION_READY_ID",
                disableDefaultUI: true, zoomControl: true
            });
            infowindow = new google.maps.InfoWindow();
            const { Place } = await google.maps.importLibrary("places");
            const request = {
                fields: ['displayName', 'location', 'id'],
                locationRestriction: { center: location, radius: 10000 },
                includedPrimaryTypes: ['gas_station'], 
                maxResultCount: 20,
            };
            try {
                const { places } = await Place.searchNearby(request);
                if (places) places.forEach(createGasStationMarker);
            } catch (error) { console.error(error); }
        }

        function addUserMarker(loc) {
            const pin = new PinElement({ background: "#00E676", scale: 0.8 });
            new AdvancedMarkerElement({ map, position: loc, content: pin.element, zIndex: 99 });
        }

        async function fetchReports() {
            try {
                const response = await fetch(GAS_URL);
                const result = await response.json();
                if(result.status === 'success') {
                    result.data.forEach(item => { dbStatus[item.placeId] = item; });
                }
            } catch (error) {}
        }

        function loadOilPrices() {
            const prices = [
                { n: "GSH 95", p: "36.85", b: "#FFEBEE", c: "#C62828" },
                { n: "GSH 91", p: "36.58", b: "#FFF8E1", c: "#F57F17" },
                { n: "E20", p: "34.74", b: "#E8F5E9", c: "#2E7D32" },
                { n: "ดีเซล", p: "32.94", b: "#E3F2FD", c: "#1565C0" }
            ];
            document.getElementById('price-list').innerHTML = prices.map(i => `
                <div class="price-card" style="background:${i.b}; border:1px solid ${i.c}44;">
                    <div class="fuel-name" style="color:${i.c}">${i.n}</div>
                    <div class="fuel-price" style="color:${i.c}">${i.p}</div>
                </div>`).join('');
        }

        function createGasStationMarker(place) {
            let pinColor = "#607D8B"; 
            let trafficTxt = '<span style="color:#888">⏳ รอการรายงานคิว</span>';
            let statusBadge = '<span class="status-badge" style="background:#607D8B">รอข้อมูล</span>';

            if (dbStatus[place.id]) {
                const r = dbStatus[place.id];
                if (r.fuelStatus === 'empty') {
                    pinColor = "#E53935";
                    statusBadge = '<span class="status-badge" style="background:#E53935">น้ำมันหมด</span>';
                    trafficTxt = '<span style="color:#E53935">❌ ปิดรับคิว</span>';
                } else {
                    statusBadge = '<span class="status-badge" style="background:#00E676; color:#000">มีน้ำมัน</span>';
                    if (r.queueLevel === 'น้อย') { pinColor="#00E676"; trafficTxt='<span style="color:#00E676">✅ คิวน้อย</span>'; }
                    else if (r.queueLevel === 'ปานกลาง') { pinColor="#FF9800"; trafficTxt='<span style="color:#FF9800">🚗 คิวปานกลาง</span>'; }
                    else { pinColor="#E65100"; trafficTxt='<span style="color:#E65100">🛑 คิวยาวมาก</span>'; }
                }
            }

            const pin = new PinElement({ background: pinColor, glyph: "⛽", glyphColor: "#fff" });
            const marker = new AdvancedMarkerElement({ map, position: place.location, content: pin.element, title: place.displayName });

            marker.addListener("click", () => {
                const html = `
                    <div class="info-window">
                        <h3 style="margin:0 0 8px 0; font-size:14px;">⛽ ${place.displayName}</h3>
                        ${statusBadge}<br>
                        <small>สภาพจราจร: ${trafficTxt}</small>
                        <hr>
                        <div class="form-group">
                            <label>สถานะน้ำมัน</label>
                            <div class="radio-group">
                                <label><input type="radio" name="f" value="available" checked> มี</label>
                                <label><input type="radio" name="f" value="empty"> หมด</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>ปริมาณคิวที่รอ</label>
                            <div class="radio-group">
                                <label><input type="radio" name="q" value="น้อย" checked> น้อย</label>
                                <label><input type="radio" name="q" value="ปานกลาง"> กลาง</label>
                                <label><input type="radio" name="q" value="มาก"> มาก</label>
                            </div>
                        </div>
                        <button class="btn-submit" onclick="sendReport('${place.id}','${place.displayName.replace(/'/g, "\\\\'")}')">อัปเดตสถานะ</button>
                    </div>`;
                infowindow.setContent(html);
                infowindow.open(map, marker);
            });
        }

        async function sendReport(id, name) {
            const fuelStatus = document.querySelector('input[name="f"]:checked').value;
            const queueLevel = document.querySelector('input[name="q"]:checked').value; 
            const btn = document.querySelector('.btn-submit');
            btn.innerText = "กำลังอัปเดต..."; btn.disabled = true;

            try {
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ placeId: id, placeName: name, fuelStatus, queueLevel, userId: lineUserId }) 
                });
                location.reload();
            } catch (e) { alert("เกิดข้อผิดพลาด"); btn.disabled = false; }
        }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIYKKj4yT7Ys0__UdYEYNaMeIKw1V0h0I&loading=async&libraries=places,geometry,marker&callback=initMap"></script>
</body>
</html>
